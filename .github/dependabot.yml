# Dependabot configuration — keeps dependencies current with grouped, low-noise PRs.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # npm (Next.js app dependencies)
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Europe/Warsaw'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    groups:
      # One PR per week for all minor + patch bumps to keep review load low.
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - 'minor'
          - 'patch'

  # GitHub Actions used by the CI/CD workflows.
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Europe/Warsaw'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'ci'
    groups:
      actions-minor-and-patch:
        applies-to: version-updates
        update-types:
          - 'minor'
          - 'patch'
